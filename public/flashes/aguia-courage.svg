<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">

  <!-- Dotted arc top-left -->
  <path d="M 60 200 Q 80 80 180 30" stroke="#111" stroke-width="0.8" stroke-dasharray="2,5" fill="none"/>
  <circle cx="182" cy="28" r="2.5" fill="#111"/>
  <circle cx="60" cy="200" r="2.5" fill="#111"/>

  <!-- Geometric octahedron / icosahedron top -->
  <!-- Outer hexagon -->
  <polygon points="140,15 165,30 165,58 140,72 115,58 115,30" stroke="#111" stroke-width="1.4" fill="none"/>
  <!-- Inner hexagon -->
  <polygon points="140,25 158,35 158,55 140,65 122,55 122,35" stroke="#111" stroke-width="0.8" fill="none"/>
  <!-- Center lines -->
  <line x1="115" y1="30" x2="165" y2="58" stroke="#111" stroke-width="0.7"/>
  <line x1="165" y1="30" x2="115" y2="58" stroke="#111" stroke-width="0.7"/>
  <line x1="140" y1="15" x2="140" y2="72" stroke="#111" stroke-width="0.7"/>
  <!-- Center dot -->
  <circle cx="140" cy="43" r="5" fill="#111"/>
  <circle cx="140" cy="43" r="2" fill="#eee"/>

  <!-- Small dot indicators -->
  <circle cx="202" cy="38" r="3" fill="#111" opacity="0.5"/>
  <circle cx="215" cy="55" r="2" fill="#111" opacity="0.4"/>
  <circle cx="74" cy="62" r="2.5" fill="#111" opacity="0.5"/>

  <!-- Vertical line from octahedron -->
  <line x1="140" y1="72" x2="140" y2="90" stroke="#111" stroke-width="1.2"/>
  <circle cx="140" cy="85" r="4" fill="#111"/>

  <!-- Eagle body - centered, dynamic pose landing/spreading wings -->
  <!-- Left wing outer -->
  <path d="M140 140 C120 128 95 118 68 108 C55 103 45 100 38 104 C45 112 60 116 75 118 C60 120 48 125 42 132 C50 136 65 132 80 128 C68 134 58 142 55 150 C64 150 76 144 88 138 C78 148 72 158 73 168 C82 164 92 154 100 144 C95 155 92 168 95 178 C104 172 110 160 115 148 L140 160 Z" fill="#111"/>
  <!-- Left wing detail lines -->
  <path d="M100 120 C85 125 70 132 60 140" stroke="#333" stroke-width="0.8"/>
  <path d="M105 128 C90 134 76 140 66 148" stroke="#333" stroke-width="0.7"/>
  <path d="M108 136 C96 142 84 148 75 156" stroke="#333" stroke-width="0.6"/>

  <!-- Right wing outer -->
  <path d="M140 140 C160 128 185 118 212 108 C225 103 235 100 242 104 C235 112 220 116 205 118 C220 120 232 125 238 132 C230 136 215 132 200 128 C212 134 222 142 225 150 C216 150 204 144 192 138 C202 148 208 158 207 168 C198 164 188 154 180 144 C185 155 188 168 185 178 C176 172 170 160 165 148 L140 160 Z" fill="#111"/>
  <!-- Right wing detail lines -->
  <path d="M180 120 C195 125 210 132 220 140" stroke="#333" stroke-width="0.8"/>
  <path d="M175 128 C190 134 204 140 214 148" stroke="#333" stroke-width="0.7"/>
  <path d="M172 136 C184 142 196 148 205 156" stroke="#333" stroke-width="0.6"/>

  <!-- Eagle body/chest -->
  <path d="M126 100 C122 112 120 128 122 142 C124 155 132 164 140 166 C148 164 156 155 158 142 C160 128 158 112 154 100 C150 90 145 86 140 86 C135 86 130 90 126 100Z" fill="#111"/>
  <!-- Feather detail on chest -->
  <path d="M130 108 C134 106 138 107 140 110" stroke="#333" stroke-width="0.8"/>
  <path d="M128 118 C133 116 137 117 140 120" stroke="#333" stroke-width="0.7"/>
  <path d="M128 128 C133 126 137 127 140 130" stroke="#333" stroke-width="0.7"/>
  <path d="M130 138 C134 136 138 137 140 140" stroke="#333" stroke-width="0.7"/>

  <!-- Eagle head -->
  <path d="M130 90 C126 84 124 76 128 70 C132 64 136 62 140 63 C144 62 148 64 152 70 C156 76 154 84 150 90 C146 95 144 98 140 98 C136 98 134 95 130 90Z" fill="#111"/>
  <!-- Beak -->
  <path d="M140 76 C144 74 150 76 152 82 C152 85 149 88 145 87 C142 83 140 80 140 76Z" fill="#111"/>
  <!-- Eye -->
  <circle cx="134" cy="80" r="5" fill="#eee"/>
  <circle cx="134" cy="80" r="3" fill="#111"/>
  <circle cx="135.5" cy="79" r="1" fill="#eee"/>

  <!-- Rectangle frame overlapping eagle -->
  <rect x="108" y="95" width="64" height="80" stroke="#111" stroke-width="1.2"/>
  <!-- Small numeric labels like in Bruno's work -->
  <text x="178" y="120" font-family="'Courier New', monospace" font-size="9" fill="#111">0</text>
  <text x="183" y="135" font-family="'Courier New', monospace" font-size="9" fill="#111">1</text>

  <!-- Horizontal bar through eagle -->
  <rect x="100" y="150" width="80" height="4" fill="#111"/>
  <rect x="85" y="160" width="110" height="2" fill="#111" opacity="0.5"/>

  <!-- Black square element right -->
  <rect x="196" y="145" width="14" height="28" fill="#111"/>

  <!-- COURAGE text - stacked vertically -->
  <!-- Portrait photo frame -->
  <rect x="116" y="252" width="50" height="60" stroke="#111" stroke-width="1.2"/>
  <rect x="120" y="256" width="42" height="52" stroke="#111" stroke-width="0.5"/>
  <!-- Small portrait fill -->
  <path d="M120 280 C128 270 152 270 160 280 L160 308 L120 308 Z" fill="#111" opacity="0.25"/>

  <!-- COURAGE letters stacked -->
  <text x="124" y="332" font-family="'Times New Roman', serif" font-size="13" letter-spacing="2" fill="#111" font-weight="400">C</text>
  <text x="124" y="348" font-family="'Times New Roman', serif" font-size="13" letter-spacing="2" fill="#111">O</text>
  <text x="124" y="364" font-family="'Times New Roman', serif" font-size="13" letter-spacing="2" fill="#111">U</text>
  <text x="124" y="380" font-family="'Times New Roman', serif" font-size="13" letter-spacing="2" fill="#111">R</text>
  <text x="124" y="396" font-family="'Times New Roman', serif" font-size="13" letter-spacing="2" fill="#111">A</text>
  <text x="124" y="412" font-family="'Times New Roman', serif" font-size="13" letter-spacing="2" fill="#111">G</text>
  <text x="124" y="428" font-family="'Times New Roman', serif" font-size="13" letter-spacing="2" fill="#111">E</text>

  <!-- Dotwork elements -->
  <circle cx="88" cy="250" r="1.5" fill="#111"/>
  <circle cx="84" cy="262" r="1" fill="#111"/>
  <circle cx="92" cy="272" r="1.2" fill="#111"/>
  <circle cx="86" cy="282" r="0.8" fill="#111"/>

  <circle cx="192" cy="248" r="1.5" fill="#111"/>
  <circle cx="196" cy="260" r="1" fill="#111"/>
  <circle cx="188" cy="270" r="1.2" fill="#111"/>
  <circle cx="194" cy="282" r="0.8" fill="#111"/>

  <!-- Bottom dot-line -->
  <path d="M90 440 Q140 448 190 440" stroke="#111" stroke-width="0.7" stroke-dasharray="2,4" fill="none"/>
  <circle cx="80" cy="440" r="2.5" fill="#111" opacity="0.6"/>

</svg>
