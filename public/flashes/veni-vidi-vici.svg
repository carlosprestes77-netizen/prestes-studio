  <text x="52" y="220" font-family="'Times New Roman', Georgia, serif" font-size="28" letter-spacing="4" fill="#111" font-weight="400">VIDI</text>
  <text x="52" y="255" font-family="'Times New Roman', Georgia, serif" font-size="28" letter-spacing="4" fill="#111" font-weight="400">VICI</text>

  <!-- Roman warrior statue - right/center, side profile facing left -->
  <!-- Torso/armor - muscular cuirass -->
  <path d="M155 175 C150 188 148 205 150 224 C152 240 158 254 166 262 C170 266 174 268 178 268 C182 268 188 265 193 260 C200 252 204 238 206 224 C208 208 206 190 202 176 C198 164 190 158 182 156 C174 154 164 158 158 165 Z" fill="#111"/>

