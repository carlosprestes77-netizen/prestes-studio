  <circle cx="90" cy="355" r="20" stroke="#111" stroke-width="1" fill="none"/>
  <polygon points="90,337 102,344 106,355 102,366 90,373 78,366 74,355 78,344" stroke="#111" stroke-width="0.7" fill="none"/>
  <circle cx="90" cy="355" r="5" fill="#111"/>

  <!-- Dotwork scattered -->
  <circle cx="48" cy="138" r="1.5" fill="#111"/>
  <circle cx="44" cy="152" r="1" fill="#111"/>
  <circle cx="50" cy="165" r="1.2" fill="#111"/>
  <circle cx="44" cy="176" r="0.8" fill="#111"/>

  <circle cx="230" cy="285" r="1.5" fill="#111"/>
  <circle cx="236" cy="298" r="1" fill="#111"/>
  <circle cx="228" cy="312" r="0.8" fill="#111"/>

  <!-- Key symbol (small, decorative) -->
  <circle cx="72" cy="295" r="6" stroke="#111" stroke-width="1.2" fill="none"/>
  <line x1="72" y1="301" x2="72" y2="325" stroke="#111" stroke-width="1.2"/>
  <line x1="72" y1="316" x2="78" y2="316" stroke="#111" stroke-width="1.2"/>
  <line x1="72" y1="322" x2="76" y2="322" stroke="#111" stroke-width="1.2"/>

  <!-- Dotted line across bottom -->
  <line x1="50" y1="420" x2="230" y2="420" stroke="#111" stroke-width="0.6" stroke-dasharray="2,5"/>
  <circle cx="50" cy="420" r="2.5" fill="#111" opacity="0.6"/>
  <circle cx="230" cy="420" r="2.5" fill="#111" opacity="0.6"/>

</svg>
